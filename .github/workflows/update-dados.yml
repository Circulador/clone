name: 🔄 Atualizar dados.json das planilhas

on:
  schedule:
    # Executa todos os dias às 11h (UTC-3 = horário Brasília)
    - cron: '0 11 * * *'
  
  # Permite disparo manual via GitHub UI
  workflow_dispatch:
  
  # Executa ao fazer push em dados.json
  push:
    paths:
      - 'scripts/fetch_sheets.py'
      - '.github/workflows/update-dados.yml'

jobs:
  fetch-and-update:
    name: Fetch & Update
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      actions: read
    
    steps:
      - name: 📥 Clonar repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: 🐍 Configurar Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 📦 Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install openpyxl requests
      
      - name: 🔍 Executar fetch_sheets.py
        run: |
          python scripts/fetch_sheets.py
        continue-on-error: true
      
      - name: 📊 Verificar dados.json
        run: |
          if [ -f dados.json ]; then
            echo "✅ dados.json gerado"
            wc -l dados.json
            head -c 200 dados.json
            echo ""
          else
            echo "⚠️ Arquivo não encontrado"
            exit 1
          fi
      
      - name: 🚀 Commit & Push (se houver mudanças)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '🔄 Atualizar dados.json (via GitHub Actions)'
          commit_options: '--no-verify'
          file_pattern: 'dados.json'
          skip_dirty_check: false
          status_options: '--porcelain'
      
      - name: 📢 Notificar resultado
        run: |
          echo "✅ Workflow concluído em $(date)"
          echo "📊 Verifique: https://github.com/${{ github.repository }}/blob/main/dados.json"